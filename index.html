      </div>
    </div>`).join('');

  const roNotice = p.isPublic ? `<div class="ro-notice">👁 Read-only · Public event preview · Sign up to interact</div>` : '';

  const energyBtn = p.canReact
    ? `<button class="eng-btn like-btn ${liked?'lit':''}" data-id="${p.id}"><span class="eng-icon">⚡</span><span class="like-label">${liked?'Energised':'Energy'}</span></button>`
    : `<div class="tip-wrap"><button class="eng-btn off"><span class="eng-icon">⚡</span><span>Energy</span></button><div class="tip-box">Reactions not available for your role</div></div>`;

  const commentBtn = p.canComment
    ? `<button class="eng-btn"><span class="eng-icon">💬</span><span>Comment</span></button>`
    : `<div class="tip-wrap"><button class="eng-btn off"><span class="eng-icon">💬</span><span>Comment</span></button><div class="tip-box">${p.isPublic ? 'Login required to comment' : 'Only Experts & Advisors can comment'}</div></div>`;

  const shareBtn = `<button class="eng-btn share-right"><span class="eng-icon">↗</span><span>Share</span></button>`;

  const overlay = p.isPublic ? `<div class="readonly-banner"><div class="readonly-label">👁 Public Preview</div></div>` : '';

  return `
  <div class="post-card" data-id="${p.id}">
    <div class="post-header">
      <div class="avatar-ring avatar-42 ${p.ring}">
        <div class="avatar-inner" style="width:37px;height:37px;">${p.avatar}</div>
      </div>
      <div class="post-meta">
        <div class="name-row">
          <span class="username">${p.username}</span>
          <span class="badge ${p.bClass}">${p.badge}</span>
          <span class="type-pill ${p.tClass}">${p.type}</span>
        </div>
        <div class="post-loc">${p.loc}</div>
      </div>
      <button class="more-btn">⋯</button>
    </div>

    <div class="img-wrap">
      <img src="${p.img}" alt="${p.title}" loading="lazy"/>
      <div class="img-border"></div>
      ${overlay}
      <div class="stat-pill">
        <span class="stat-val">${p.stats.a}</span>
        <span class="stat-sep">|</span>
        <span class="stat-val">${p.stats.b}</span>
      </div>
      ${p.verified ? '<div class="verified-pill">✓ AI Verified</div>' : ''}
    </div>

    <div class="post-body">
      <div class="post-title">${p.title}</div>
      <div class="post-caption">${p.caption}</div>
    </div>

    <div class="post-footer">
      <div class="eng-row">
        ${energyBtn}
        ${commentBtn}
        ${shareBtn}
      </div>
      ${p.canReact ? `<div class="cheer-line" id="cheers-${p.id}">${p.cheers+(liked?1:0)} peers gave Energy</div>` : ''}
      <div class="time-row">${p.time}${p.verified?' <span class="ai-tag">AI Verified</span>':''}</div>
    </div>

    ${roNotice}
    ${cmts ? `<div class="comments">${cmts}</div>` : ''}
  </div>`;
}

function attachLikes() {
  document.querySelectorAll('.like-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.id);
      const post = POSTS.find(p => p.id === id);
      if (likedPosts.has(id)) { likedPosts.delete(id); btn.classList.remove('lit'); btn.querySelector('.like-label').textContent = 'Energy'; }
      else { likedPosts.add(id); btn.classList.add('lit'); btn.querySelector('.like-label').textContent = 'Energised'; }
      const el = document.getElementById('cheers-'+id);
      if (el) el.textContent = (post.cheers+(likedPosts.has(id)?1:0)) + ' peers gave Energy';
    });
  });
}

let step=1, selType='', selLoc='';
const SG_LOCS = ['East Coast Park','Gardens by the Bay','Marina Bay Promenade','Botanic Gardens (UNESCO)','Kallang ActiveSG','Jurong Lake Gardens','Bishan-Ang Mo Kio Park','VivoCity Waterfront'];

function openModal(){ step=1; selType=''; selLoc=''; renderModal(); }

function renderModal(){
  const segs = [1,2,3,4,5].map(i=>`<div class="step-seg ${i<step?'done':i===step?'active':''}"></div>`).join('');
  let body='';

  if(step===1){
    body=`
      <div class="modal-head"><div class="modal-step-num">1</div><div class="modal-title">Capture content</div></div>
      <div class="step-bar">${segs}</div>
      <div class="upload-zone" onclick="nextStep()">
        <div class="upload-icon">📷</div>
        <div style="font-size:13px;font-weight:500;color:var(--gray-700);">Tap to upload a photo or screenshot</div>
        <div style="font-size:11px;margin-top:5px;color:var(--gray-500);">Apple Health · Garmin · Camera roll</div>
      </div>
      <div class="btn-row">
        <button class="m-btn sec" onclick="closeModal()">Cancel</button>
        <button class="m-btn pri" onclick="nextStep()">Next →</button>
      </div>`;
  } else if(step===2){
    body=`
      <div class="modal-head"><div class="modal-step-num">2</div><div class="modal-title">AI privacy scrub</div></div>
      <div class="step-bar">${segs}</div>
      <div class="priv-box"><span style="font-size:16px;">🛡️</span><div><strong>AIA Health Guard scanning…</strong><br>Checking for faces, licence plates, NRIC numbers & sensitive identifiers. Detected items are auto-blurred.</div></div>
      <div style="background:var(--gray-50);border-radius:var(--radius-md);padding:14px;margin-bottom:14px;border:0.5px solid var(--gray-200);">
        <div class="scan-item"><span>✅</span> No faces detected</div>
        <div class="scan-item"><span>✅</span> No vehicle plates detected</div>
        <div class="scan-item"><span>✅</span> No NRIC / ID numbers found</div>
        <div class="scan-item"><span>⚠️</span> 1 building number blurred automatically</div>
      </div>
      <div class="btn-row">
        <button class="m-btn sec" onclick="prevStep()">← Back</button>
        <button class="m-btn pri" onclick="nextStep()">Next →</button>
      </div>`;
  } else if(step===3){
    const types=[['🏃','Exercise'],['🥗','Food'],['❤️','Health'],['🏅','Event'],['⭐','Recruit']];
    body=`
      <div class="modal-head"><div class="modal-step-num">3</div><div class="modal-title">Define the activity</div></div>
      <div class="step-bar">${segs}</div>
      <div class="type-grid">${types.map(([ic,v])=>`<button class="type-btn${selType===v?' sel':''}" onclick="selT('${v}')">${ic} ${v}</button>`).join('')}</div>
      <input class="m-input" placeholder="Title (e.g. Morning Cardio)" id="mTitle"/>
      <textarea class="m-input" rows="3" placeholder="Caption (optional)" id="mCaption" style="resize:none;"></textarea>
      <div class="btn-row">
        <button class="m-btn sec" onclick="prevStep()">← Back</button>
        <button class="m-btn pri" onclick="nextStep()">Next →</button>
      </div>`;
  } else if(step===4){
    const pubs = SG_LOCS.map(l=>`<button class="loc-btn${selLoc===l?' sel':''}" onclick="selL('${l}')"><span>📍</span><div><div style="font-size:13px;font-weight:500;">${l}</div><div style="font-size:11px;color:var(--gray-500);">Verified public spot · Appears on map</div></div></button>`).join('');
    body=`
      <div class="modal-head"><div class="modal-step-num">4</div><div class="modal-title">Set location</div></div>
      <div class="step-bar">${segs}</div>
      ${pubs}
      <button class="loc-btn${selLoc==='private'?' sel':''}" onclick="selL('private')"><span>🏠</span><div><div style="font-size:13px;font-weight:500;">Private Space</div><div style="font-size:11px;color:var(--gray-500);">Home / Condo · Feed only, hidden from map</div></div></button>
      <div class="btn-row" style="margin-top:10px;">
        <button class="m-btn sec" onclick="prevStep()">← Back</button>
        <button class="m-btn pri" onclick="nextStep()">Next →</button>
      </div>`;
  } else if(step===5){
    body=`
      <div class="modal-head"><div class="modal-step-num">5</div><div class="modal-title">Verify & publish</div></div>
      <div class="step-bar">${segs}</div>
      <div class="green-box"><span style="font-size:24px;">✅</span><div><div style="font-weight:600;font-size:13px;">Post meets Vitality standards</div><div style="font-size:12px;margin-top:2px;">Privacy scrub complete · Content verified</div></div></div>
      <div class="info-box">
        <div>Type: <strong>${selType||'Exercise'}</strong></div>
        <div>Location: <strong>${selLoc==='private'?'🏠 Private Space':selLoc?'📍 '+selLoc:'📍 Public Spot'}</strong></div>
        <div style="margin-top:6px;color:#5B21B6;font-size:11px;">🤖 AIA Health Guard: Your post is safe and ready to share!</div>
      </div>
      <div class="btn-row">
        <button class="m-btn sec" id="mBack" onclick="prevStep()">← Back</button>
        <button class="m-btn pri" id="mPub" onclick="doPublish()">Share to Hub</button>
      </div>
      <div style="text-align:center;font-size:10px;color:var(--gray-500);margin-top:12px;">By posting you agree to the Vitality Community Guidelines.</div>`;
  }

  document.getElementById('modalRoot').innerHTML=`
    <div class="modal-bg" onclick="bgClick(event)">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        ${body}
      </div>
    </div>`;
}

window.nextStep=()=>{step=Math.min(5,step+1);renderModal();};
window.prevStep=()=>{step=Math.max(1,step-1);renderModal();};
window.closeModal=()=>{document.getElementById('modalRoot').innerHTML='';};
window.bgClick=(e)=>{if(e.target.classList.contains('modal-bg'))closeModal();};
window.selT=(v)=>{selType=v;renderModal();};
window.selL=(v)=>{selLoc=v;renderModal();};
window.doPublish=()=>{
  const btn=document.getElementById('mPub'), back=document.getElementById('mBack');
  btn.disabled=true; btn.textContent='Verifying…'; if(back)back.style.display='none';
  setTimeout(()=>{
    closeModal();
    const toast=document.createElement('div');
    toast.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#E31837;color:#fff;padding:11px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:400;box-shadow:0 4px 16px rgba(227,24,55,0.4);white-space:nowrap;';
    toast.textContent='🛡️ Post Verified & Shared to Hub!';
    document.body.appendChild(toast);
    setTimeout(()=>{toast.style.opacity='0';toast.style.transition='opacity 0.4s';setTimeout(()=>toast.remove(),400);},3000);
  },1600);
};

document.getElementById('postFab').addEventListener('click',openModal);
renderPosts();
</script>
